<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FitBuddy - AI健身教练</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<div class="app-container">
  <!-- SPA 页面容器 -->
  <div id="app-pages">
    <div id="page-welcome" class="page active"></div>
    <div id="page-basic-info" class="page"></div>
    <div id="page-training-goals" class="page"></div>
    <div id="page-training-experience" class="page"></div>
    <div id="page-analysis-report" class="page"></div>
    <div id="page-dashboard" class="page"></div>
    <div id="page-training-plan" class="page"></div>
    <div id="page-daily-workout" class="page"></div>
    <div id="page-exercise-detail" class="page"></div>
    <div id="page-daily-checkin" class="page"></div>
    <div id="page-progress-tracking" class="page"></div>
    <div id="page-diet-plan" class="page"></div>
    <div id="page-profile" class="page"></div>
  </div>

  <!-- 底部 Tab 导航 -->
  <div class="bottom-tab" id="bottomTab">
    <div class="tab-item active" data-page="dashboard" onclick="App.navigate('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>首页</span>
    </div>
    <div class="tab-item" data-page="training-plan" onclick="App.navigate('training-plan')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>训练</span>
    </div>
    <div class="tab-item" data-page="progress-tracking" onclick="App.navigate('progress-tracking')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span>进度</span>
    </div>
    <div class="tab-item" data-page="diet-plan" onclick="App.navigate('diet-plan')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
      </svg>
      <span>饮食</span>
    </div>
    <div class="tab-item" data-page="profile" onclick="App.navigate('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4-4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      <span>我的</span>
    </div>
  </div>
</div>

<!-- Toast 提示 -->
<div class="feature-toast" id="featureToast"></div>

<!-- 编辑资料弹窗 (动态创建) -->

<!-- 设置面板 -->
<div class="settings-mask" id="settingsPanel" onclick="if(event.target===this)closeSettingsPanel()">
  <div class="settings-panel">
    <div class="settings-handle"></div>
    <div class="settings-header">
      <div class="settings-title">设置</div>
      <button class="settings-close" onclick="closeSettingsPanel()">&times;</button>
    </div>
    <div class="settings-group">
      <div class="settings-group-label">账号</div>
      <div class="settings-card">
        <div class="settings-row" onclick="showToast('账号与安全')">
          <div class="settings-row-icon">&#x1F512;</div>
          <div class="settings-row-text">账号与安全</div>
          <div class="settings-row-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
        </div>
        <div class="settings-row" onclick="showToast('隐私设置')">
          <div class="settings-row-icon">&#x1F6E1;</div>
          <div class="settings-row-text">隐私设置</div>
          <div class="settings-row-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
        </div>
      </div>
    </div>
    <div class="settings-group">
      <div class="settings-group-label">通用</div>
      <div class="settings-card">
        <div class="settings-row toggle" id="rowNotify" onclick="toggleSettingSwitch('rowNotify')">
          <div class="settings-row-icon">&#x1F514;</div>
          <div class="settings-row-text">消息通知</div>
          <div class="switch"></div>
        </div>
        <div class="settings-row toggle on" id="rowSound" onclick="toggleSettingSwitch('rowSound')">
          <div class="settings-row-icon">&#x1F50A;</div>
          <div class="settings-row-text">训练音效</div>
          <div class="switch"></div>
        </div>
        <div class="settings-row" onclick="showToast('缓存已清除')">
          <div class="settings-row-icon">&#x1F9F9;</div>
          <div class="settings-row-text">清除缓存</div>
          <div class="settings-row-value">12.3 MB</div>
          <div class="settings-row-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
        </div>
      </div>
    </div>
    <div class="settings-group">
      <div class="settings-group-label">关于</div>
      <div class="settings-card">
        <div class="settings-row" onclick="showToast('关于 FitBuddy v1.0.0')">
          <div class="settings-row-icon">&#x2139;</div>
          <div class="settings-row-text">关于 FitBuddy</div>
          <div class="settings-row-value">v1.0.0</div>
          <div class="settings-row-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ESC 键关闭所有弹窗 -->
<script>
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var openSettings = document.getElementById('settingsPanel');
    if (openSettings && openSettings.classList.contains('show')) {
      openSettings.classList.remove('show');
    }
  }
});

function toggleSettingSwitch(rowId) {
  var row = document.getElementById(rowId);
  if (row) row.classList.toggle('on');
}

function closeSettingsPanel() {
  document.getElementById('settingsPanel').classList.remove('show');
}
</script>

<!-- 加载 JS 模块 -->
<script src="js/utils.js"></script>
<script src="js/store.js"></script>
<script src="js/pages/welcome.js"></script>
<script src="js/pages/basic-info.js"></script>
<script src="js/pages/training-goals.js"></script>
<script src="js/pages/training-experience.js"></script>
<script src="js/pages/analysis-report.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/training-plan.js"></script>
<script src="js/pages/daily-workout.js"></script>
<script src="js/pages/exercise-detail.js"></script>
<script src="js/pages/daily-checkin.js"></script>
<script src="js/pages/progress-tracking.js"></script>
<script src="js/pages/diet-plan.js"></script>
<script src="js/pages/profile.js"></script>
<script src="js/app.js"></script>

</body>
</html>
