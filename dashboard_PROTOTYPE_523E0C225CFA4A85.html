<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitBuddy - 首页</title>
<style>
:root {
  --primary: #FF6B35; --primary-light: rgba(255,107,53,0.08);
  --accent: #36CFC9; --accent-light: rgba(54,207,201,0.08);
  --bg: #F9FAFB; --card: #FFFFFF;
  --text-primary: #1F2937; --text-secondary: #6B7280;
  --border: #E5E7EB; --success: #10B981; --warning: #F59E0B;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
  background: #F0F2F5; display: flex; justify-content: center; min-height: 100vh;
}
.app-container { width: 100%; max-width: 430px; min-height: 100vh; background: var(--bg); padding-bottom: 80px; }
.top-bar {
  padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
  background: var(--card); border-bottom: 1px solid var(--border);
}
.top-greeting { font-size: 13px; color: var(--text-secondary); font-weight: 400; }
.top-name { font-size: 18px; font-weight: 700; color: var(--text-primary); }
.top-avatar {
  width: 40px; height: 40px; border-radius: 50%; background: var(--primary-light);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.streak-banner {
  margin: 16px 20px; background: linear-gradient(135deg, #FF6B35, #FF8C5A);
  border-radius: 14px; padding: 20px; color: #FFF;
}
.streak-header { display: flex; align-items: center; justify-content: space-between; }
.streak-fire { font-size: 32px; }
.streak-days { font-size: 36px; font-weight: 700; }
.streak-label { font-size: 13px; opacity: 0.9; font-weight: 400; }
.streak-stats { display: flex; gap: 20px; margin-top: 14px; }
.streak-stat { text-align: center; }
.streak-stat-val { font-size: 16px; font-weight: 700; }
.streak-stat-lbl { font-size: 11px; opacity: 0.8; font-weight: 400; }
.today-section { padding: 0 20px; margin-bottom: 20px; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.section-title { font-size: 17px; font-weight: 600; color: var(--text-primary); }
.section-link { font-size: 13px; color: var(--primary); font-weight: 400; cursor: pointer; text-decoration: none; }
.today-card {
  background: var(--card); border-radius: 14px; padding: 20px;
  border: 1px solid var(--border);
}
.today-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.today-day { font-size: 15px; font-weight: 600; color: var(--text-primary); }
.today-type { font-size: 12px; color: var(--primary); background: var(--primary-light); padding: 4px 10px; border-radius: 6px; font-weight: 400; }
.today-goal { font-size: 13px; color: var(--text-secondary); margin-bottom: 14px; font-weight: 400; }
.today-meta { display: flex; gap: 20px; margin-bottom: 16px; }
.today-meta-item { text-align: center; }
.today-meta-val { font-size: 16px; font-weight: 700; color: var(--text-primary); }
.today-meta-lbl { font-size: 11px; color: var(--text-secondary); font-weight: 400; }
.btn-start {
  width: 100%; height: 46px; background: var(--primary); color: #FFF;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.btn-start:hover { background: #E55A2B; }
.btn-start:active { transform: scale(0.98); }
.quick-actions { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; padding: 0 20px; margin-bottom: 20px; }
.quick-action {
  background: var(--card); border-radius: 12px; padding: 14px 8px;
  text-align: center; border: 1px solid var(--border); cursor: pointer;
  transition: all 0.2s; text-decoration: none;
}
.quick-action:hover { border-color: var(--primary); transform: translateY(-1px); }
.quick-action:active { transform: scale(0.96); }
.quick-action-icon { font-size: 24px; margin-bottom: 6px; }
.quick-action-text { font-size: 11px; color: var(--text-secondary); font-weight: 400; }
.progress-section { padding: 0 20px; margin-bottom: 20px; }
.progress-card {
  background: var(--card); border-radius: 14px; padding: 18px;
  border: 1px solid var(--border);
}
.progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.progress-row:last-child { margin-bottom: 0; }
.progress-label { font-size: 13px; color: var(--text-secondary); font-weight: 400; }
.progress-value { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.progress-bar-wrap { height: 6px; background: var(--border); border-radius: 3px; margin-top: 6px; flex: 1; margin-left: 12px; }
.progress-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); }
.progress-item { display: flex; align-items: center; }
.progress-item .progress-label { min-width: 70px; }
.weight-trend { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.weight-trend span { font-size: 13px; }
.weight-down { color: var(--success); font-weight: 600; }
.bottom-tab {
  position: fixed; bottom: 0; width: 100%; max-width: 430px;
  background: var(--card); border-top: 1px solid var(--border);
  display: flex; padding: 6px 0 env(safe-area-inset-bottom, 8px);
  z-index: 100;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 6px 0; cursor: pointer; transition: all 0.2s;
  text-decoration: none; color: var(--text-secondary);
}
.tab-item.active { color: var(--primary); }
.tab-item svg { width: 22px; height: 22px; margin-bottom: 3px; }
.tab-item span { font-size: 10px; font-weight: 400; }
</style>
</head>
<body>
<div class="app-container">
  <div class="top-bar">
    <div>
      <div class="top-greeting">早上好 &#x1F31E;</div>
      <div class="top-name">小美</div>
    </div>
    <div class="top-avatar" id="topAvatar">&#x1F469;</div>
  </div>

  <div class="streak-banner">
    <div class="streak-header">
      <div>
        <div class="streak-fire">&#x1F525;</div>
        <div class="streak-label">连续打卡</div>
      </div>
      <div style="text-align:right">
        <div class="streak-days">12</div>
        <div class="streak-label">天</div>
      </div>
    </div>
    <div class="streak-stats">
      <div class="streak-stat"><div class="streak-stat-val">12次</div><div class="streak-stat-lbl">累计训练</div></div>
      <div class="streak-stat"><div class="streak-stat-val">6.2h</div><div class="streak-stat-lbl">累计时长</div></div>
      <div class="streak-stat"><div class="streak-stat-val">4,230</div><div class="streak-stat-lbl">消耗热量</div></div>
    </div>
  </div>

  <div class="today-section">
    <div class="section-header">
      <h3 class="section-title">今日训练</h3>
      <a class="section-link" onclick="navigateTo('training-plan')">查看周计划</a>
    </div>
    <div class="today-card">
      <div class="today-card-header">
        <span class="today-day">周一 · 臀腿力量训练</span>
        <span class="today-type">力量训练</span>
      </div>
      <div class="today-goal">今日目标：完成4个动作，重点激活臀大肌和股四头肌</div>
      <div class="today-meta">
        <div class="today-meta-item"><div class="today-meta-val">35</div><div class="today-meta-lbl">预计分钟</div></div>
        <div class="today-meta-item"><div class="today-meta-val">4</div><div class="today-meta-lbl">训练动作</div></div>
        <div class="today-meta-item"><div class="today-meta-val">280</div><div class="today-meta-lbl">预计消耗(kcal)</div></div>
      </div>
      <button class="btn-start" onclick="navigateTo('daily-workout')">开始今日训练</button>
    </div>
  </div>

  <div class="quick-actions">
    <div class="quick-action" onclick="navigateTo('daily-checkin')">
      <div class="quick-action-icon">&#x2705;</div>
      <div class="quick-action-text">打卡</div>
    </div>
    <div class="quick-action" onclick="navigateTo('diet-plan')">
      <div class="quick-action-icon">&#x1F372;</div>
      <div class="quick-action-text">饮食</div>
    </div>
    <div class="quick-action" onclick="navigateTo('progress-tracking')">
      <div class="quick-action-icon">&#x1F4C8;</div>
      <div class="quick-action-text">进度</div>
    </div>
    <div class="quick-action" onclick="navigateTo('profile')">
      <div class="quick-action-icon">&#x2699;</div>
      <div class="quick-action-text">我的</div>
    </div>
  </div>

  <div class="progress-section">
    <div class="section-header">
      <h3 class="section-title">目标进度</h3>
      <a class="section-link" onclick="navigateTo('progress-tracking')">详细数据</a>
    </div>
    <div class="progress-card">
      <div class="progress-row">
        <div class="progress-item">
          <span class="progress-label">体重变化</span>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:45%"></div></div>
        </div>
        <span class="progress-value">-4.2kg / -11kg</span>
      </div>
      <div class="progress-row">
        <div class="progress-item">
          <span class="progress-label">训练完成率</span>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:92%"></div></div>
        </div>
        <span class="progress-value" style="color:var(--success)">92%</span>
      </div>
      <div class="weight-trend">
        <span style="color:var(--text-secondary)">本周体重</span>
        <span class="weight-down">&#x2193; 0.6kg 趋势良好</span>
      </div>
    </div>
  </div>
</div>

<div class="bottom-tab">
  <a class="tab-item active" onclick="navigateTo('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>首页</span>
  </a>
  <a class="tab-item" onclick="navigateTo('training-plan')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>训练</span>
  </a>
  <a class="tab-item" onclick="navigateTo('progress-tracking')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span>进度</span>
  </a>
  <a class="tab-item" onclick="navigateTo('diet-plan')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
    <span>饮食</span>
  </a>
  <a class="tab-item" onclick="navigateTo('profile')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4-4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>我的</span>
  </a>
</div>

<script>
var PAGE_URLS={welcome:'./welcome_PROTOTYPE_AE8BF0C677F44D11.html','basic-info':'./basic-info_PROTOTYPE_577C9CE5800B46B7.html','training-goals':'./training-goals_PROTOTYPE_68BE44E236D64BAE.html','training-experience':'./training-experience_PROTOTYPE_04D1896309714B02.html','analysis-report':'./analysis-report_PROTOTYPE_E80F0FC4A99749C1.html',dashboard:'./dashboard_PROTOTYPE_523E0C225CFA4A85.html','training-plan':'./training-plan_PROTOTYPE_C3EB8FC4A69843CB.html','daily-workout':'./daily-workout_PROTOTYPE_CD3F0A439A594F46.html','exercise-detail':'./exercise-detail_PROTOTYPE_5EFB86B43407489A.html','daily-checkin':'./daily-checkin_PROTOTYPE_1417AAC5029941B3.html','progress-tracking':'./progress-tracking_PROTOTYPE_F808929A2BD0425E.html','diet-plan':'./diet-plan_PROTOTYPE_BFCEFD02D1B5446B.html',profile:'./profile_PROTOTYPE_E7708D8D96F84C50.html'};
function navigateTo(page) { if(PAGE_URLS[page]) window.location.href=PAGE_URLS[page]; }

var USER_GENDER = 'female';
var AVATAR_BY_GENDER = { female: '👩', male: '👨' };
function updateAvatarByGender() {
  var avatarEl = document.getElementById('topAvatar');
  if (avatarEl) { avatarEl.textContent = AVATAR_BY_GENDER[USER_GENDER] || AVATAR_BY_GENDER.female; }
}
document.addEventListener('DOMContentLoaded', updateAvatarByGender);

function retryImage(img) {
  var c=parseInt(img.getAttribute('data-retry-count'))||0,m=parseInt(img.getAttribute('data-max-retry'))||10;
  if(c<m){img.setAttribute('data-retry-count',c+1);img.src=img.src.replace(/retry=\d+/,'retry='+(c+1))+'&t='+Date.now();}
  else{img.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgZmlsbD0iI0U1RTdFQiIvPjwvc3ZnPg==';img.onerror=null;}
}
</script>
</body>
</html>
