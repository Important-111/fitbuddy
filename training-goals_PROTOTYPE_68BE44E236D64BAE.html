<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitBuddy - 训练目标</title>
<style>
:root {
  --primary: #FF6B35; --primary-light: rgba(255,107,53,0.08);
  --accent: #36CFC9; --accent-light: rgba(54,207,201,0.08);
  --bg: #F9FAFB; --card: #FFFFFF;
  --text-primary: #1F2937; --text-secondary: #6B7280;
  --border: #E5E7EB; --success: #10B981;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
  background: #F0F2F5; display: flex; justify-content: center; min-height: 100vh;
}
.app-container { width: 100%; max-width: 430px; min-height: 100vh; background: var(--bg); }
.top-bar {
  padding: 12px 16px; display: flex; align-items: center; gap: 12px;
  background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;
}
.btn-back {
  width: 36px; height: 36px; border: none; background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; color: var(--text-primary);
  border-radius: 8px; transition: background 0.2s;
}
.btn-back:hover { background: var(--border); }
.top-bar-title { font-size: 17px; font-weight: 600; color: var(--text-primary); }
.progress-bar-wrap { padding: 16px 24px; background: var(--card); }
.progress-steps { display: flex; justify-content: space-between; }
.progress-step {
  width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; background: var(--border); color: var(--text-secondary);
}
.progress-step.active { background: var(--primary); color: #FFF; }
.progress-step.done { background: var(--success); color: #FFF; }
.progress-bar-bg { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; }
.progress-bar-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.3s; }
.progress-label { text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 8px; font-weight: 400; }
.form-section { padding: 20px 24px; }
.section-title { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
.section-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; font-weight: 400; line-height: 1.5; }
.goal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.goal-card {
  padding: 16px 14px; border: 2px solid var(--border); border-radius: 12px;
  cursor: pointer; transition: all 0.2s; background: var(--card); text-align: center;
}
.goal-card.selected { border-color: var(--primary); background: var(--primary-light); }
.goal-icon { font-size: 28px; margin-bottom: 8px; }
.goal-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.goal-card.selected .goal-name { color: var(--primary); }
.goal-card:hover { border-color: var(--primary); transform: translateY(-1px); }
.goal-card:active { transform: scale(0.98); }
.bottom-nav { padding: 16px 24px 32px; background: var(--card); border-top: 1px solid var(--border); }
.btn-primary {
  width: 100%; height: 50px; background: var(--primary); color: #FFF;
  border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.btn-primary:hover { background: #E55A2B; }
.btn-primary:active { transform: scale(0.98); }
.selected-count { font-size: 12px; color: var(--text-secondary); text-align: center; margin-top: 10px; }
</style>
</head>
<body>
<div class="app-container">
  <div class="top-bar">
    <button class="btn-back" onclick="navigateTo('basic-info')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="top-bar-title">建立你的档案</span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-steps">
      <div class="progress-step done">&#10003;</div>
      <div class="progress-step active">2</div>
      <div class="progress-step">3</div>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:66%"></div></div>
    <div class="progress-label">步骤 2/3 · 选择训练目标（可多选）</div>
  </div>
  <div class="form-section">
    <h2 class="section-title">训练目标</h2>
    <p class="section-desc">选择你想要达成的目标，AI将据此制定个性化训练计划</p>
    <div class="goal-grid" id="goalGrid">
      <div class="goal-card" onclick="toggleGoal(this)"><div class="goal-icon">&#x1F525;</div><div class="goal-name">减脂</div></div>
      <div class="goal-card" onclick="toggleGoal(this)"><div class="goal-icon">&#x1F4AA;</div><div class="goal-name">增肌</div></div>
      <div class="goal-card" onclick="toggleGoal(this)"><div class="goal-icon">&#x2728;</div><div class="goal-name">塑形</div></div>
      <div class="goal-card" onclick="toggleGoal(this)"><div class="goal-icon">&#x1F3CB;</div><div class="goal-name">提高力量</div></div>
      <div class="goal-card" onclick="toggleGoal(this)"><div class="goal-icon">&#x1F3C3;</div><div class="goal-name">提高耐力</div></div>
      <div class="goal-card" onclick="toggleGoal(this)"><div class="goal-icon">&#x1F9CD;</div><div class="goal-name">改善体态</div></div>
      <div class="goal-card" onclick="toggleGoal(this)"><div class="goal-icon">&#x1F351;</div><div class="goal-name">翘臀</div></div>
      <div class="goal-card" onclick="toggleGoal(this)"><div class="goal-icon">&#x1F9AC;</div><div class="goal-name">腹肌</div></div>
      <div class="goal-card" onclick="toggleGoal(this)"><div class="goal-icon">&#x1F9CD;</div><div class="goal-name">腿部塑形</div></div>
      <div class="goal-card" onclick="toggleGoal(this)"><div class="goal-icon">&#x1F31F;</div><div class="goal-name">全身紧致</div></div>
      <div class="goal-card" onclick="toggleGoal(this)"><div class="goal-icon">&#x1F3E5;</div><div class="goal-name">康复训练</div></div>
      <div class="goal-card" onclick="toggleGoal(this)"><div class="goal-icon">&#x1F4CB;</div><div class="goal-name">其它</div></div>
    </div>
  </div>
  <div class="bottom-nav">
    <button class="btn-primary" onclick="navigateTo('training-experience')">下一步：训练经验与条件</button>
    <div class="selected-count" id="countDisplay">已选择 0 个目标</div>
  </div>
</div>
<script>
function toggleGoal(el) {
  el.classList.toggle('selected');
  var count = document.querySelectorAll('.goal-card.selected').length;
  document.getElementById('countDisplay').textContent = '已选择 ' + count + ' 个目标';
}
var PAGE_URLS={welcome:'./welcome_PROTOTYPE_AE8BF0C677F44D11.html','basic-info':'./basic-info_PROTOTYPE_577C9CE5800B46B7.html','training-goals':'./training-goals_PROTOTYPE_68BE44E236D64BAE.html','training-experience':'./training-experience_PROTOTYPE_04D1896309714B02.html','analysis-report':'./analysis-report_PROTOTYPE_E80F0FC4A99749C1.html',dashboard:'./dashboard_PROTOTYPE_523E0C225CFA4A85.html','training-plan':'./training-plan_PROTOTYPE_C3EB8FC4A69843CB.html','daily-workout':'./daily-workout_PROTOTYPE_CD3F0A439A594F46.html','exercise-detail':'./exercise-detail_PROTOTYPE_5EFB86B43407489A.html','daily-checkin':'./daily-checkin_PROTOTYPE_1417AAC5029941B3.html','progress-tracking':'./progress-tracking_PROTOTYPE_F808929A2BD0425E.html','diet-plan':'./diet-plan_PROTOTYPE_BFCEFD02D1B5446B.html',profile:'./profile_PROTOTYPE_E7708D8D96F84C50.html'};
function navigateTo(page) { if(PAGE_URLS[page]) window.location.href=PAGE_URLS[page]; }
function retryImage(img) {
  var c=parseInt(img.getAttribute('data-retry-count'))||0,m=parseInt(img.getAttribute('data-max-retry'))||10;
  if(c<m){img.setAttribute('data-retry-count',c+1);img.src=img.src.replace(/retry=\d+/,'retry='+(c+1))+'&t='+Date.now();}
  else{img.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgZmlsbD0iI0U1RTdFQiIvPjwvc3ZnPg==';img.onerror=null;}
}
</script>
</body>
</html>
